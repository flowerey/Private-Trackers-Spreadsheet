name: Sync Upstream Trackers

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Download Jackett Definitions
        run: |
          git clone --depth 1 --no-checkout https://github.com/Jackett/Jackett.git jackett_temp
          cd jackett_temp
          git sparse-checkout set src/Jackett.Common/Indexers/Definitions
          git checkout
          mv src/Jackett.Common/Indexers/Definitions ../definitions
          cd ..
          rm -rf jackett_temp

      - name: Sync trackers
        run: |
          python update_types.py
          python sync_trackers.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trackers.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tracker categories and sync stats"
            git push
          fi
